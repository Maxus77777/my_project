name: Python CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код из репозитория
        uses: actions/checkout@v3

      - name: Установить Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt

      - name: Проверка кода — flake8
        run: |
          flake8 . --max-line-length=120 --exclude=.git,__pycache__

      - name: Проверка кода — pylint
        run: |
          pylint *.py --fail-under=7.0 || true

      - name: Запуск тестов — pytest
        run: |
          pytest test_calculator.py -v

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Получить код
        uses: actions/checkout@v3

      - name: Собрать Docker-образ
        run: |
          docker build -t my_project:latest .

      - name: Проверить что образ создан
        run: |
          docker images my_project
